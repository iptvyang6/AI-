name: AI Daily News

on:
schedule:
- cron: '0 1 * * *'
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Generate AI News
    run: |
      cat > index.html << 'EOF'
      <!DOCTYPE html>
      <html lang="zh-CN">
      <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>全球AI每日情报站</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <style>
      body{
      background:#0b1020;
      color:white;
      font-family:sans-serif;
      padding:40px;
      }
      .card{
      background:rgba(255,255,255,0.06);
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
      }
      </style>
      </head>
      <body>

      <h1 style="font-size:42px;font-weight:bold;">
      全球 AI 每日情报站
      </h1>

      <div class="card">
      <h2>今日AI动态</h2>
      <p>GitHub Actions 自动更新成功。</p>
      <p>DeepSeek 自动化系统即将接入。</p>
      <p>更新时间：$(date)</p>
      </div>

      </body>
      </html>
      EOF

  - name: Commit files
    run: |
      git config --local user.email "action@github.com"
      git config --local user.name "github-actions"
      git add .
      git commit -m "auto update" || echo "no changes"
      git push
```
